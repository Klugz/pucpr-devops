name: Notificação Discord

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  notify:
    runs-on: ubuntu-latest
    # Para PRs, só notifica se foi de fato mergeado (não apenas fechado)
    if: github.event_name == 'push' || github.event.pull_request.merged == true

    steps:
      - name: Notificar Discord — sucesso no merge/push
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: success
          title: "Novo commit em ${{ github.repository }}"
          description: |
            **Branch:** `${{ github.ref_name }}`
            **Autor:** ${{ github.actor }}
            **Mensagem:** ${{ github.event.head_commit.message || github.event.pull_request.title }}
          color: 0x57F287
          username: "GitHub Actions"
          avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          url: "${{ github.event.head_commit.url || github.event.pull_request.html_url }}"

